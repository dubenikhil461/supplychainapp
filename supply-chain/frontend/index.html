<!--
filename: frontend/index.html
purpose: Vite HTML template and Tailwind CDN import.
setup notes: Tailwind utilities are loaded through CDN.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Supply Chain Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "monospace"],
            },
            animation: {
              "gradient-shift": "gradient-shift 14s ease infinite",
              float: "float 18s ease-in-out infinite",
            },
            keyframes: {
              "gradient-shift": {
                "0%, 100%": { backgroundPosition: "0% 50%" },
                "50%": { backgroundPosition: "100% 50%" },
              },
              float: {
                "0%, 100%": { transform: "translate(0, 0) scale(1)" },
                "33%": { transform: "translate(12px, -18px) scale(1.03)" },
                "66%": { transform: "translate(-10px, 10px) scale(0.98)" },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-sans antialiased bg-slate-950 text-slate-100">
    <div id="root"></div>
    <script src="/src/main.jsx" type="module"></script>
  </body>
</html>
